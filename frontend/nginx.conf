server {
    listen ${PORT};
    server_name _;
    client_max_body_size ${CLIENT_MAX_BODY_SIZE};

    # Serve the React SPA
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Upstream config is injected via envsubst at container start.
    # Use environment variables: BACKEND_HOST, BACKEND_PORT or BACKEND_URL -> BACKEND_TARGET

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         ${BACKEND_TARGET};
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        # Pass the actual upstream host as Host header so SNI and virtual-hosting work
        proxy_set_header   Host              $proxy_host;
        # Enable SNI when proxying to HTTPS upstreams
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Media / static served by backend ─────────────────────────────────────
    location /media/ {
        proxy_pass ${BACKEND_TARGET};
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # ── WebSocket (Django Channels) ───────────────────────────────────────────
    location /ws/ {
        proxy_pass             ${BACKEND_TARGET};
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $proxy_host;
        proxy_set_header       X-Forwarded-Host  $host;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_read_timeout     86400s;
        proxy_send_timeout     86400s;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection      "1; mode=block" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
}