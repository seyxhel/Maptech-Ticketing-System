services:

  # ── Django / Daphne backend ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # !! Override SECRET_KEY with a long random value in production !!
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      # Allow the Nginx frontend container to reach the API
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      CORS_ALLOW_ALL_ORIGINS: ${CORS_ALLOW_ALL_ORIGINS:-False}
      # SQLite is stored in the named volume mounted at /app/data
      DB_PATH: /app/data/db.sqlite3
      # Optional: use an external Postgres (e.g. Railway). Set DATABASE_URL in your environment or .env file.
      DATABASE_URL: ${DATABASE_URL:-}
      # How long to wait for the DB host:port to be reachable (seconds)
      WAIT_FOR_DB_SECONDS: ${WAIT_FOR_DB_SECONDS:-30}
      # If set to 1/true, backend will run seed management commands after migrations
      AUTO_SEED: ${AUTO_SEED:-False}
    volumes:
      # Persist the SQLite database file across container rebuilds
      - backend_db:/app/data
      # Persist uploaded media files (profile pictures, ticket attachments, …)
      - backend_media:/app/media
    expose:
      # Only reachable by other Docker services; not published to the host
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── React / Nginx frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./Maptech_FrontendUI-main
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      # Expose to the host — change to "443:443" and add SSL certs for HTTPS
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # By default, frontend proxies to the backend service in the same compose network.
      # In production (Railway), set BACKEND_URL to your backend's public URL (no trailing slash).
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}

  # ── One-shot seed runner ─────────────────────────────────────────────────
  # Use this to populate the database with initial data. It runs migrations
  # then the project's management seed commands and exits. Run with:
  #   docker-compose run --rm seed
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: ${DATABASE_URL:-}
      DB_PATH: /app/data/db.sqlite3
      WAIT_FOR_DB_SECONDS: ${WAIT_FOR_DB_SECONDS:-30}
    volumes:
      - backend_db:/app/data
      - backend_media:/app/media
    depends_on:
      backend:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput && \
      python manage.py seed_users || true && \
      python manage.py seed_services || true && \
      python manage.py seed_categories || true && \
      python manage.py seed_tickets || true"

# ── Named volumes ────────────────────────────────────────────────────────────
volumes:
  # SQLite database directory — survives container rebuilds
  backend_db:
  # User-uploaded files — survives container rebuilds
  backend_media:
